language: python
grammar: tree_sitter_python
queries:
  function_definition: "(function_definition name: (identifier) @name)"
  class_definition: "(class_definition name: (identifier) @name)"
  import_statement: "(import_statement name: (dotted_name) @name)"
  import_from_statement: "(import_from_statement module_name: (dotted_name) @module name: (dotted_name) @name)"
  call_bare: "(call function: (identifier) @name)"
  call_member: "(call function: (attribute attribute: (identifier) @name))"
node_types:
  function_definition: function
  class_definition: class
