language: c
grammar: tree_sitter_c
queries:
  function_definition: "(function_definition declarator: (function_declarator declarator: (identifier) @name))"
  struct_definition: "(struct_specifier name: (type_identifier) @name)"
  call_expression: "(call_expression function: (identifier) @name)"
node_types:
  function_definition: function
  struct_specifier: class
